name: al_quran
description: "A "
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.6 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.1
  font_awesome_flutter: ^10.7.0
  shared_preferences: ^2.2.2
  dropdown_button2: ^2.3.9
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.8.3
  scrollable_positioned_list: ^0.3.8
  tuple: ^2.0.2
  flutter_hooks: ^0.20.5
  fluttertoast: ^8.2.4
  from_css_color: ^2.0.0
  permission_handler: ^11.3.0
  device_info_plus: ^9.1.2
  http: 1.2.0
  background_downloader: ^8.2.1
  just_audio: ^0.9.36
  flutter_inappwebview: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1
  change_app_package_name: ^1.1.0
  flutter_native_splash: ^2.3.10

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/images/light/
    - assets/images/dark/
    - assets/images/milk/
    - assets/images/blue/
    - assets/images/night/
    - assets/database/
    - assets/fonts/
    - assets/icon/
    - assets/js/

  fonts:
    - family: regularFont
      fonts:
        - asset: assets/fonts/regularFont.ttf

    - family: semiBoldFont
      fonts:
        - asset: assets/fonts/semiBoldFont.ttf

    - family: boldFont
      fonts:
        - asset: assets/fonts/boldFont.ttf

    - family: amiriQuran
      fonts:
        - asset: assets/fonts/amiriQuran.ttf

    - family: kitab
      fonts:
        - asset: assets/fonts/kitab.ttf

    - family: lateef
      fonts:
        - asset: assets/fonts/lateef.ttf

    - family: meQuran
      fonts:
        - asset: assets/fonts/meQuran.ttf

    - family: noorehidayat
      fonts:
        - asset: assets/fonts/noorehidayat.ttf

    - family: noorehira
      fonts:
        - asset: assets/fonts/noorehira.ttf

    - family: noorehuda
      fonts:
        - asset: assets/fonts/noorehuda.ttf

    - family: qalam
      fonts:
        - asset: assets/fonts/qalam.ttf

flutter_native_splash:
  color: "#dee3e6"
  color_dark: "#222324"
  image: assets/images/brand.png

  android_12:
    color: "#dee3e6"
    color_dark: "#222324"
    image: assets/images/brand.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
